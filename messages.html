<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages | Ore Celebrations</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="assets/js/tailwind-config.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Caveat:wght@400;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" />
    <link rel="stylesheet" href="assets/css/site.css" />
  </head>
  <body class="bg-background text-on-background font-body-md min-h-screen selection:bg-primary-container selection:text-on-primary-container">
    <div class="fixed inset-0 z-[-1] overflow-hidden">
      <div class="absolute inset-0 bg-slate-950/60 z-[1]"></div>
      <img alt="" class="bg-video-dim opacity-90" data-bind="hero-img" src="" />
    </div>
    <nav class="fixed top-0 left-0 right-0 z-50 flex items-center justify-center">
      <div class="bg-slate-900/20 backdrop-blur-xl rounded-full mt-4 mx-auto max-w-fit px-6 py-2 border border-white/10 shadow-[0_8px_32px_0_rgba(241,213,146,0.1)] flex items-center gap-6 md:gap-8">
        <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-yellow-400 to-yellow-600 bg-clip-text text-transparent tracking-tight" data-bind="site-title">Ore Celebrations</a>
        <div class="hidden md:flex gap-6 items-center">
          <a data-feature="scrapbook" data-nav-top="scrapbook" class="font-sans tracking-tight" href="scrapbook.html">Scrapbook</a>
          <a data-feature="vault" data-nav-top="vault" class="font-sans tracking-tight" href="vault.html">Vault</a>
          <a data-feature="gallery" data-nav-top="gallery" class="font-sans tracking-tight" href="gallery.html">Gallery</a>
          <a data-feature="messages" data-nav-top="messages" class="font-sans tracking-tight" href="messages.html">Messages</a>
        </div>
        <div class="flex items-center gap-3 border-l border-white/10 pl-4">
          <div class="w-8 h-8 rounded-full border border-yellow-500/50 overflow-hidden">
            <img data-bind="profile-img" alt="" class="w-full h-full object-cover" src="" />
          </div>
        </div>
      </div>
    </nav>
    <aside class="fixed left-0 top-0 bottom-0 w-64 hidden lg:flex flex-col bg-slate-950/40 backdrop-blur-2xl h-[calc(100vh-4rem)] my-8 ml-4 rounded-3xl border-r border-white/5 shadow-2xl shadow-yellow-900/20 z-40">
      <div class="p-8">
        <p class="font-black text-yellow-500 text-xl tracking-tighter">The Dig Site</p>
        <p class="font-sans uppercase tracking-widest text-[10px] text-slate-400 mt-1">Mining Memories</p>
      </div>
      <nav class="flex-1 space-y-1 px-2">
        <a href="index.html" data-nav="home" class="py-3 px-6 flex items-center gap-4 transition-all"><span class="material-symbols-outlined">construction</span><span class="font-sans uppercase tracking-widest text-xs">Home</span></a>
        <a data-feature="gallery" href="gallery.html" data-nav="gallery" class="py-3 px-6 flex items-center gap-4 transition-all"><span class="material-symbols-outlined">diamond</span><span class="font-sans uppercase tracking-widest text-xs">Gallery</span></a>
        <a data-feature="vault" href="vault.html" data-nav="vault" class="py-3 px-6 flex items-center gap-4 transition-all"><span class="material-symbols-outlined">potted_plant</span><span class="font-sans uppercase tracking-widest text-xs">Vault</span></a>
        <a data-feature="messages" href="messages.html" data-nav="messages" class="py-3 px-6 flex items-center gap-4 transition-all"><span class="material-symbols-outlined">push_pin</span><span class="font-sans uppercase tracking-widest text-xs">Messages</span></a>
        <a data-feature="quiz" href="quiz.html" data-nav="quiz" class="py-3 px-6 flex items-center gap-4 transition-all"><span class="material-symbols-outlined">quiz</span><span class="font-sans uppercase tracking-widest text-xs">Truth Drill</span></a>
        <a data-feature="scrapbook" href="scrapbook.html" data-nav="scrapbook" class="py-3 px-6 flex items-center gap-4 transition-all"><span class="material-symbols-outlined">auto_stories</span><span class="font-sans uppercase tracking-widest text-xs">Scrapbook</span></a>
      </nav>
    </aside>
    <main class="lg:ml-72 pt-32 px-margin pb-24 lg:pb-20 relative">
      <header class="mb-12">
        <h1 class="font-display-lg text-display-lg text-primary mb-2" id="msg-title">The Friendship Board</h1>
        <p class="font-body-md text-on-surface-variant max-w-lg" id="msg-subtitle"></p>
      </header>
      <div id="msg-board" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-gutter relative"></div>
    </main>
    <footer class="w-full flex justify-between items-center px-12 mt-16 pb-24 lg:pb-8">
      <div class="flex items-center gap-2">
        <span class="text-yellow-500 font-bold font-sans uppercase tracking-widest text-[10px]" data-bind="site-title">Ore</span>
        <span class="font-mono text-[10px] uppercase text-slate-500">© <span data-bind="footer-year"></span></span>
      </div>
    </footer>
    <div class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-slate-900/80 backdrop-blur-xl border-t border-white/10 flex justify-around py-3 text-[10px]">
      <a class="flex flex-col items-center text-slate-400" href="index.html"><span class="material-symbols-outlined">construction</span>Home</a>
      <a data-feature="gallery" class="flex flex-col items-center text-slate-400" href="gallery.html"><span class="material-symbols-outlined">diamond</span>Gallery</a>
      <a data-feature="messages" class="flex flex-col items-center text-yellow-400" href="messages.html"><span class="material-symbols-outlined">push_pin</span>Notes</a>
      <a data-feature="quiz" class="flex flex-col items-center text-slate-400" href="quiz.html"><span class="material-symbols-outlined">quiz</span>Drill</a>
    </div>
    <script src="assets/js/site-data.js"></script>
    <script src="assets/js/shell.js"></script>
    <script>
      function palette(t) {
        if (t === "teal") return { shell: "bg-tertiary-container/30 border border-white/10", body: "text-on-tertiary-container", by: "text-on-tertiary-container" };
        if (t === "gold") return { shell: "bg-primary-container/20 border-2 border-yellow-500/20", body: "text-primary-fixed-dim italic", by: "text-primary-fixed-dim uppercase" };
        if (t === "slate") return { shell: "bg-surface-container-highest/40 border-l-4 border-secondary", body: "text-on-surface-variant", by: "text-outline text-right" };
        if (t === "violet") return { shell: "bg-violet-500/20 border border-violet-300/30", body: "text-violet-100", by: "text-violet-200 uppercase" };
        if (t === "mint") return { shell: "bg-emerald-400/20 border border-emerald-200/30", body: "text-emerald-100", by: "text-emerald-200 uppercase" };
        if (t === "sunset") return { shell: "bg-orange-400/25 border border-orange-200/30", body: "text-orange-50", by: "text-orange-100 uppercase" };
        if (t === "sky") return { shell: "bg-sky-400/20 border border-sky-200/30", body: "text-sky-100", by: "text-sky-100 uppercase" };
        return { shell: "bg-secondary-container/40 border border-white/5", body: "text-secondary-fixed", by: "text-outline uppercase" };
      }
      function safeColor(v) {
        var s = String(v || "").trim();
        if (!s) return "";
        if (/^#[0-9a-fA-F]{3,8}$/.test(s)) return s;
        return "";
      }
      function shapeClass(shape) {
        if (shape === "gem") return "gem-shape flex flex-col items-center justify-center text-center aspect-square p-8";
        if (shape === "crane") return "aspect-square flex flex-col justify-between p-7 rounded-[26%_74%_68%_32%/31%_34%_66%_69%]";
        if (shape === "excavator") return "aspect-square flex flex-col justify-between p-7 rounded-[18%_82%_25%_75%/75%_24%_76%_25%]";
        if (shape === "caterpillar") return "aspect-square flex flex-col justify-between p-7 rounded-[42px]";
        return "aspect-square flex flex-col justify-between p-8";
      }
      function shapeBadge(shape) {
        if (shape === "crane") return "construction";
        if (shape === "excavator") return "precision_manufacturing";
        if (shape === "caterpillar") return "directions_walk";
        return "";
      }
      document.addEventListener("DOMContentLoaded", async function () {
        var data = await applySiteShell({ active: "messages" });
        var mp = data.messagesPage || {};
        if (mp.title) document.getElementById("msg-title").textContent = mp.title;
        document.getElementById("msg-subtitle").textContent = mp.subtitle || "";
        var root = document.getElementById("msg-board");
        (data.messages || []).forEach(function (m, i) {
          var pal = palette(m.tint || "rose");
          var forced = safeColor(m.textColor);
          var gem = m.shape === "gem";
          var badge = shapeBadge(m.shape);
          var inner =
            '<div class="grain absolute inset-0"></div>' +
            (gem ? '<span class="material-symbols-outlined text-secondary mb-4">favorite</span>' : "") +
            (badge ? '<span class="material-symbols-outlined text-secondary/80 mb-2">' + badge + "</span>" : "") +
            '<div class="min-h-0 flex-1 overflow-auto pr-1"><p class="font-handwritten-note text-xl leading-snug ' +
            pal.body +
            (forced ? '" style="color:' + forced + ";" : '"') +
            '>' +
            escapeHtml(m.body) +
            "</p></div>" +
            (m.image
              ? '<div class="mt-4 h-32 w-full rounded-lg overflow-hidden grayscale hover:grayscale-0 transition-all duration-500"><img alt="" class="w-full h-full object-cover" src="' +
                escapeAttr(m.image) +
                '" /></div>'
              : "") +
            '<p class="mt-4 font-label-sm ' +
            pal.by +
            (forced ? '" style="color:' + forced + ";" : '"') +
            '> - ' +
            escapeHtml(m.author) +
            "</p>";
          var shapeCls = shapeClass(m.shape);
          var wrap = document.createElement("div");
          wrap.className = "relative group wobble-hover " + ["", "rotate-[-2deg] -mt-4", "rotate-[3deg] mt-6", "rotate-[-1deg]", "rotate-[1deg] -mt-8", "rotate-[-4deg] mt-2", "rotate-[5deg]"][i % 7];
          wrap.innerHTML =
            '<div class="' +
            shapeCls +
            " glass-card shadow-xl relative overflow-hidden " +
            pal.shell +
            '">' +
            inner +
            "</div>" +
            (m.tag
              ? '<div class="absolute -top-2 -left-2 rotate-[-15deg] bg-rose-400/80 px-3 py-1 rounded shadow-sm text-[10px] font-bold text-white uppercase tracking-tighter">' +
                escapeHtml(m.tag) +
                "</div>"
              : "");
          root.appendChild(wrap);
        });
      });
      function escapeHtml(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function escapeAttr(s) {
        return String(s || "").replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
